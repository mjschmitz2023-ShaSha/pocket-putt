# Pocket Putt multi-room relay — Chess101-style Blueprint
# Serves game UI + WebSocket multi-room authority + /health.
# Deploy: New → Blueprint → this repo, branch main.
# Docs: deploy/DEPLOY.md
services:
  - type: web
    name: pocket-putt-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    # PORT is injected by Render — do not set it.
    # Optional dashboard env vars (same names as Chess101):
    #   RELAY_MAX_ROOMS=200
    #   RELAY_ROOM_TIMEOUT=900
    #   RELAY_MAX_PLAYERS=8
